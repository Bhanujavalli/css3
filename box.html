<!DOCTYPE html>
<html>
<head>
<style>

.eventCard{
    border:2px solid blue;
    padding:20px;
    margin:20px;
}

input:focus{
    outline:3px solid orange;
}

.hidden{
    visibility:hidden;
}

.none{
    display:none;
}
</style>
</head>
<body>

<div class="eventCard">
    Community Event Information
</div>

<input type="text" placeholder="Enter Name">

<p class="hidden">Visibility Hidden Example</p>

<p class="none">Display None Example...</p>

</body>
</html>

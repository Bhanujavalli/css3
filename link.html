<!DOCTYPE html>
<html>
<head>
<style>

a:link{
    color:blue;
}

a:visited{
    color:purple;
}

a:hover{
    color:red;
}

a:active{
    color:green;
}

ul{
    list-style-type:square;
    list-style-position:inside;
}

li{
    margin:10px;
    padding:5px;
}

nav ul{
    list-style:none;
}
</style>
</head>
<body>

<nav>
<ul>
<li><a href="#">Home</a></li>
<li><a href="#">Events</a></li>
<li><a href="#">Contact</a></li>
</ul>
</nav>

</body>
</html>
